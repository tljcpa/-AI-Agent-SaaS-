app:
  name: "AI Office SaaS"
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
security:
  jwt_secret: "INSECURE_DEV_ONLY_SET_JWT_SECRET_ENV"
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 120
storage:
  type: "local" # local | onedrive
  base_path: "./data/users"
  onedrive_root: "ai-office-saas"
llm:
  provider: "zhipu_mock" # zhipu_mock | openai_compat
  api_key: "mock-key"
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
office:
  provider: "e5_mock" # e5_mock | graph

database:
  url: "sqlite:///./ai_office.db"

ms_graph:
  tenant_id: "common"
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:8000/api/oauth/callback"
  scopes:
    - "Files.ReadWrite"
    - "Sites.ReadWrite.All"
    - "offline_access"
